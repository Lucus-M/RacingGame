<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RacingGame</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!--Initial Join screen-->
    <div id="joinScreen" style="display: none">
        <h1>Join Lobby</h1>
        <p>Enter code to join</p>
        <input type="text" id="codeInput"></input><br>
        <input type="button" id="joinLobbyButton" value="Join"></input>

        <h1>Create Lobby</h1>
        <input type="button" id="createLobbyButton" value="Create"></input>
    </div>

    <!--Lobby Waiting screen-->
    <div id="lobbyScreen" style="display: none">
        <h1 id="lobbynamedisplay">Lobby</h1>
        <h1 id="codeDisplay">0000000</h1>

        <div>
            <p>Set Display Name:</p>
            <input type="text" id="displayName" value="PlayerName">
            <input type="button" id="setDisplayName" value="Set Name">   
        </div>
        <br>
        <h3>Players: <span id="numofplayers">0</span></h3>
        <br>
        
        <p id="playersList">

        </p>

        </br>
        <input type="button" id="startGame" style="display: none" value="Start"></input>
    </div>

    <!-- game screen -->
    <canvas id="gameScreen" width="383" height="256" style="display: none">

    </canvas>

    <p id="log">

    </p>

</body>

    <script src="public/sound.js"></script>
    <script src="public/script.js"></script>
    <script src="public/menus.js"></script>
    <script src="public/drawing.js"></script>
</html>
